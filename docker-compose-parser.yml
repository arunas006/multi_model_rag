version: "3.9"

services:
  parser:
    build:
      context: .
      dockerfile: Dockerfile.parser

    container_name: parser_service

    ports:
      - "8000:8000"

    env_file:
      - .env

    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - huggingface_cache:/root/.cache/huggingface
      - ~/.aws:/root/.aws

    depends_on:
      - ollama

    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest

    container_name: ollama_service

    ports:
      - "11434:11434"

    volumes:
      - ollama_models:/root/.ollama

    restart: unless-stopped

volumes:
  huggingface_cache:
  ollama_models: